<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda de Avisos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1a2e;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      letter-spacing: 0.02em;
    }

    header span {
      background: #1565c0;
      color: white;
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    main h2 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    main p {
      font-size: 1rem;
      color: #555;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    main img {
      width: 280px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    footer {
      width: 100%;
      background: #1a1a2e;
      color: #aaa;
      text-align: center;
      padding: 16px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>📋 Agenda de Avisos</h1>
    <span>Em desenvolvimento</span>
  </header>

  <main>
    <h2>Gerencie seus avisos com facilidade</h2>
    <p>Sistema para registrar e organizar avisos importantes para funcionários e membros de uma organização, com datas e destinatários.</p>
    <img src="img/agenda.avif" alt="Calendário de avisos"/>
  </main>

  <footer>
    Desenvolvido por Luan Victor · Faculdade · 2026
  </footer>

</body>
</html>
